<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Task Manager</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #333;
        }
        .app {
            max-width: 900px;
            margin: 40px auto;
            padding: 24px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
        }
        h1, h2 {
            margin-top: 0;
        }
        .grid {
            display: grid;
            gap: 20px;
        }
        .card {
            padding: 18px;
            border-radius: 10px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input[type="text"], input[type="password"], input[type="date"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            padding: 12px 18px;
            cursor: pointer;
            font-size: 14px;
        }
        button.secondary {
            background: #64748b;
        }
        button.delete {
            background: #ef4444;
        }
        .hidden {
            display: none;
        }
        .task-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        .task-row:last-child {
            border-bottom: none;
        }
        .task-info {
            width: 100%;
        }
        .task-info strong {
            display: block;
            margin-bottom: 4px;
        }
        .task-actions button {
            margin-left: 8px;
        }
        .status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            color: #fff;
        }
        .status.done { background: #16a34a; }
        .status.pending { background: #f97316; }
        .json-viewer {
            background: #0f172a;
            color: #f8fafc;
            padding: 14px;
            border-radius: 10px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 260px;
            overflow: auto;
        }
        .alert {
            padding: 12px;
            border-radius: 10px;
            background: #fde68a;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="app">
        <div id="authScreen">
            <h1>Daily Task Manager</h1>
            <div class="grid">
                <div class="card">
                    <h2>Register</h2>
                    <form id="registerForm">
                        <label for="registerEmail">Email</label>
                        <input type="text" id="registerEmail" required>
                        <label for="registerPassword">Password</label>
                        <input type="password" id="registerPassword" required>
                        <button type="submit">Register</button>
                    </form>
                </div>
                <div class="card">
                    <h2>Login</h2>
                    <form id="loginForm">
                        <label for="loginEmail">Email</label>
                        <input type="text" id="loginEmail" required>
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" required>
                        <button type="submit">Login</button>
                    </form>
                </div>
            </div>
        </div>

        <div id="dashboard" class="hidden">
            <div class="grid">
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <h1>Welcome, <span id="userEmail"></span></h1>
                            <p>Manage your daily tasks and monitor progress.</p>
                        </div>
                        <button id="logoutBtn" class="secondary">Logout</button>
                    </div>
                </div>
                <div class="card">
                    <h2>New Task</h2>
                    <form id="taskForm">
                        <label for="taskTitle">Title</label>
                        <input type="text" id="taskTitle" required>
                        <label for="taskDescription">Description</label>
                        <textarea id="taskDescription" rows="3"></textarea>
                        <label for="taskDueDate">Due Date</label>
                        <input type="date" id="taskDueDate">
                        <button type="submit">Add Task</button>
                    </form>
                </div>
            </div>

            <div class="card">
                <h2>Task Dashboard</h2>
                <div id="taskList"></div>
                <div class="alert">Task data is stored as JSON in browser local storage. You can view the current JSON below.</div>
                <div>
                    <h3>Task JSON</h3>
                    <div id="jsonOutput" class="json-viewer"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const usersKey = 'dailyTaskManagerUsers';
        const currentUserKey = 'dailyTaskManagerCurrentUser';
        const tasksKey = 'dailyTaskManagerTasks';

        function loadJSON(key, defaultValue) {
            const raw = localStorage.getItem(key);
            try {
                return raw ? JSON.parse(raw) : defaultValue;
            } catch (error) {
                return defaultValue;
            }
        }

        function saveJSON(key, value) {
            localStorage.setItem(key, JSON.stringify(value));
        }

        function getCurrentUser() {
            return localStorage.getItem(currentUserKey) || null;
        }

        function setCurrentUser(email) {
            if (email) localStorage.setItem(currentUserKey, email);
            else localStorage.removeItem(currentUserKey);
        }

        function showElement(id, show) {
            document.getElementById(id).classList.toggle('hidden', !show);
        }

        function showAlert(message) {
            alert(message);
        }

        function renderDashboard() {
            const user = getCurrentUser();
            if (!user) return;
            document.getElementById('userEmail').textContent = user;
            showElement('authScreen', false);
            showElement('dashboard', true);
            renderTaskList();
        }

        function renderTaskList() {
            const user = getCurrentUser();
            const tasks = loadJSON(tasksKey, {});
            const userTasks = tasks[user] || [];
            const taskList = document.getElementById('taskList');
            taskList.innerHTML = '';

            if (!userTasks.length) {
                taskList.innerHTML = '<p>No tasks yet. Add one to start tracking your progress.</p>';
            } else {
                userTasks.forEach((task, index) => {
                    const row = document.createElement('div');
                    row.className = 'task-row';

                    const info = document.createElement('div');
                    info.className = 'task-info';
                    info.innerHTML = `<strong>${task.title}</strong>
                        <span>${task.description || 'No description'}</span>
                        <span>${task.dueDate ? 'Due: ' + task.dueDate : ''}</span>`;

                    const status = document.createElement('span');
                    status.className = 'status ' + (task.done ? 'done' : 'pending');
                    status.textContent = task.done ? 'Completed' : 'Pending';
                    info.appendChild(status);

                    const actions = document.createElement('div');
                    actions.className = 'task-actions';
                    actions.innerHTML = `
                        <button class="secondary" onclick="toggleTask(${index})">${task.done ? 'Undo' : 'Complete'}</button>
                        <button onclick="editTask(${index})">Edit</button>
                        <button class="delete" onclick="deleteTask(${index})">Delete</button>
                    `;

                    row.appendChild(info);
                    row.appendChild(actions);
                    taskList.appendChild(row);
                });
            }
            updateJsonOutput(userTasks);
        }

        function updateJsonOutput(tasks) {
            const output = document.getElementById('jsonOutput');
            output.textContent = JSON.stringify(tasks, null, 2);
        }

        function registerUser(email, password) {
            const users = loadJSON(usersKey, {});
            if (users[email]) {
                showAlert('Email is already registered.');
                return false;
            }
            users[email] = {
                email,
                password: btoa(password)
            };
            saveJSON(usersKey, users);
            showAlert('Registration successful. You can now log in.');
            return true;
        }

        function loginUser(email, password) {
            const users = loadJSON(usersKey, {});
            if (!users[email] || users[email].password !== btoa(password)) {
                showAlert('Invalid email or password.');
                return false;
            }
            setCurrentUser(email);
            return true;
        }

        function addTask(task) {
            const user = getCurrentUser();
            if (!user) return;
            const tasks = loadJSON(tasksKey, {});
            if (!tasks[user]) tasks[user] = [];
            tasks[user].push(task);
            saveJSON(tasksKey, tasks);
            renderTaskList();
        }

        function updateTask(index, updatedTask) {
            const user = getCurrentUser();
            const tasks = loadJSON(tasksKey, {});
            if (!tasks[user] || !tasks[user][index]) return;
            tasks[user][index] = updatedTask;
            saveJSON(tasksKey, tasks);
            renderTaskList();
        }

        function deleteTask(index) {
            const user = getCurrentUser();
            const tasks = loadJSON(tasksKey, {});
            if (!tasks[user] || !tasks[user][index]) return;
            tasks[user].splice(index, 1);
            saveJSON(tasksKey, tasks);
            renderTaskList();
        }

        window.toggleTask = function(index) {
            const user = getCurrentUser();
            const tasks = loadJSON(tasksKey, {});
            const userTasks = tasks[user] || [];
            if (!userTasks[index]) return;
            userTasks[index].done = !userTasks[index].done;
            saveJSON(tasksKey, tasks);
            renderTaskList();
        };

        window.editTask = function(index) {
            const user = getCurrentUser();
            const tasks = loadJSON(tasksKey, {});
            const task = tasks[user][index];
            if (!task) return;
            document.getElementById('taskTitle').value = task.title;
            document.getElementById('taskDescription').value = task.description;
            document.getElementById('taskDueDate').value = task.dueDate || '';
            document.getElementById('taskForm').dataset.editIndex = index;
            document.getElementById('taskForm').querySelector('button').textContent = 'Update Task';
        };

        document.getElementById('registerForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            if (!email || !password) return;
            registerUser(email, password);
            this.reset();
        });

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) return;
            if (loginUser(email, password)) {
                renderDashboard();
            }
            this.reset();
        });

        document.getElementById('taskForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const title = document.getElementById('taskTitle').value.trim();
            const description = document.getElementById('taskDescription').value.trim();
            const dueDate = document.getElementById('taskDueDate').value;
            if (!title) return;

            const task = {
                title,
                description,
                dueDate,
                done: false,
                createdAt: new Date().toISOString()
            };

            const editIndex = this.dataset.editIndex;
            if (editIndex !== undefined) {
                if (editIndex !== '') {
                    const curTask = loadJSON(tasksKey, {})[getCurrentUser()][editIndex];
                    if (curTask) {
                        task.done = curTask.done;
                        updateTask(parseInt(editIndex, 10), task);
                    }
                }
                delete this.dataset.editIndex;
                this.querySelector('button').textContent = 'Add Task';
            } else {
                addTask(task);
            }

            this.reset();
        });

        document.getElementById('logoutBtn').addEventListener('click', function() {
            setCurrentUser(null);
            showElement('dashboard', false);
            showElement('authScreen', true);
        });

        function init() {
            if (getCurrentUser()) {
                renderDashboard();
            }
        }

        init();
    </script>
</body>
</html>
